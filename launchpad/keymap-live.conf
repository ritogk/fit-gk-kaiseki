# Launchpad X - fit-gk-kaiseki ライブモード用キーマップ
#
# 対象キーのみ割り当て（それ以外のパッドは消灯）
#
# 書式: TYPE NUMBER KEY_NAME [LED_IDLE_COLOR LED_PRESSED_COLOR]
# ノート番号: 十の位=下からの段(1=最下段) / 一の位=左からの列(1=左端)
#
# レイアウト（上から見た配置。3段。主要キーは中央(col2-7)に集約し、左右の指で押しやすく。
#              中段中央(col4-5)=ウィンカー。あまり使わない H.S/HORN/STOP は右端列(col8)の下方へ）:
#
#   col:      1        2        3        4        5        6        7        8
#   5x 上段 [      ][ LB:Q ][ HB:W ][ HZ:E ][ PS:A ][ FG:S ][CHR+:U][ H.S:B]
#   4x 中段 [      ][ROOM:T][CRGO:Y][◀TL:R][ TR:D▶][WA-F:K][WA-R:L][HORN:SP]   WA=ウォッシャー
#   3x 下段 [      ][LOCK:Z][UNLK:X][CHRP:C][WI-FL:G][WI-FH:H][WI-R:J][STOP:V]  WI=ワイパー
#
# 左端(col1)は空き。左手=col2-3 / 親指=中央ウィンカー(col4-5) / 右手=col6-7 / 右端=低頻度キー
# ※ウィンカーは LiveMode と同じく KEY_R=左信号(TL) / KEY_D=右信号(TR)
#
# 配色方針: 通常キーは緑(green=21)で点灯し、押下時のみ明点灯(72)。
#   右端の低頻度3キーだけ色分け → H.S=yellow(13) / HORN=orange(9) / STOP=purple(53)
#
# LED色: 0=off 5=red 9=orange 13=yellow 21=green 37=cyan 45=blue 53=purple 72=bright 117=dim

# 5x: 上段 ライト + CHRP+ / 右端=短ホーン(H.S)
N 52 KEY_Q     21  72
N 53 KEY_W     21  72
N 54 KEY_E     21  72
N 55 KEY_A     21  72
N 56 KEY_S     21  72
N 57 KEY_U     21  72
N 58 KEY_B     13  72

# 4x: 中段 室内/ウォッシャー + 中央ウィンカー (KEY_R=左 / KEY_D=右) / 右端=ホーン
N 42 KEY_T     21  72
N 43 KEY_Y     21  72
N 44 KEY_R     21  72
N 45 KEY_D     21  72
N 46 KEY_K     21  72
N 47 KEY_L     21  72
N 48 KEY_SPACE 9   72

# 3x: 下段 ドア操作 + ワイパー / 右端=全停止(STOP)
N 32 KEY_Z     21  72
N 33 KEY_X     21  72
N 34 KEY_C     21  72
N 35 KEY_G     21  72
N 36 KEY_H     21  72
N 37 KEY_J     21  72
N 38 KEY_V     53  72
