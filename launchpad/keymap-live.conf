# Launchpad X - fit-gk-kaiseki ライブモード用キーマップ
#
# 対象キーのみ割り当て（それ以外のパッドは消灯）
#
# 書式: TYPE NUMBER KEY_NAME [LED_IDLE_COLOR LED_PRESSED_COLOR]
#
# レイアウト（上から見た配置、左下寄せ）:
#
#   [LB:Q] [HB:W] [HZ:E] [STOP:V]                             Row 4  ライト上段+全停止
#   [PS:A] [FG:S] [TL:D] [TR:R]                                Row 3  ライト下段
#   [LK:Z] [UL:X] [CH:C] [HORN]                                Row 2  アクション+ホーン
#
# LED色: 0=off 5=red 9=orange 13=yellow 21=green 37=cyan 45=blue 53=purple 72=bright

# Row 4: ライト上段 (LB, HB, HZ) + 全停止 - 橙/赤
N 41 KEY_Q     9  72
N 42 KEY_W     9  72
N 43 KEY_E     9  72
N 44 KEY_V     5  72

# Row 3: ライト下段 (PS, FG, TL, TR) - 黄
N 31 KEY_A     13 72
N 32 KEY_S     13 72
N 33 KEY_D     13 72
N 34 KEY_R     13 72

# Row 2: アクション (LOCK, UNLOCK, CHIRP) + ホーン - 青/赤
N 21 KEY_Z     45 72
N 22 KEY_X     45 72
N 23 KEY_C     45 72
N 24 KEY_SPACE 5  72
