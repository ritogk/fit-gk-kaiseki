# Launchpad X - fit-gk-kaiseki ライブモード用キーマップ
#
# 対象キーのみ割り当て（それ以外のパッドは消灯）
#
# 書式: TYPE NUMBER KEY_NAME [LED_IDLE_COLOR LED_PRESSED_COLOR]
# ノート番号: 十の位=下からの段(1=最下段) / 一の位=左からの列(1=左端)
#
# レイアウト（上から見た配置。4段。2段目(中央)=ライト類, ホーン系は右下に縦並び）:
#
#   col:      1        2        3        4        5         6        7        8
#   5x 1段目 [      ][      ][      ][CRGO:Y][      ][      ][      ][STOP:V]
#   4x 2段目 [      ][ LB:Q ][ HB:W ][ HZ:E ][ PS:A ][ FG:S ][◀TL:R ][ TR:D▶]   ライト類(中央)
#   3x 3段目 [      ][      ][LOCK:Z][UNLK:X][CHRP:C][CHR+:U][ H.S:B][      ]
#   2x 4段目 [      ][WI-R:J][WA-R:L][WI-FH:H][WI-FL:G][WA-F:K][ROOM:T][HORN:SP]   WI=ワイパー WA=ウォッシャー
#
# ※ウィンカーは LiveMode と同じく KEY_R=左信号(TL) / KEY_D=右信号(TR)
# ※ROOM+フロントワイパー(WI-FL/FH)+フロントウォッシャー(WA-F)を4段目左に隣接配置(セット運用)
# ※ホーン系(H.S/HORN)は右端(col8)に縦並び
#
# 配色方針: 機能カテゴリ単位で色分け（押下時のみ明点灯72）。
#   ライト類=red(5){LB/HB/HZ/PS/FG/ウィンカー/室内灯ROOM/CARGO}
#   音(H.S=yellow13, HORN=orange9) / ワイパー=blue(45) / 水(ウォッシャー)=cyan(37)
#   ドア(LOCK/UNLK)+チャープ(CHRP/CHR+)=同一グループ purple(53) / STOP=white(3, 他と被らない)
#
# LED色: 0=off 3=white 5=red 9=orange 13=yellow 21=green 37=cyan 45=blue 53=purple 72=bright 117=dim

# 5x: 1段目 荷室灯(ランプ類=red) / 右端=STOP(white)
N 54 KEY_Y     5   72
N 58 KEY_V     3   72

# 4x: 2段目 ライト類(中央) / 右2列=ウィンカー (KEY_R=左 / KEY_D=右)
N 42 KEY_Q     5   72
N 43 KEY_W     5   72
N 44 KEY_E     5   72
N 45 KEY_A     5   72
N 46 KEY_S     5   72
N 47 KEY_R     5   72
N 48 KEY_D     5   72

# 3x: 3段目 ドア+チャープ(同一グループ=purple) / col7=短ホーン H.S(yellow)
N 33 KEY_Z     53  72
N 34 KEY_X     53  72
N 35 KEY_C     53  72
N 36 KEY_U     53  72
N 37 KEY_B     13  72

# 2x: 4段目 WI-R/WA-R(後方) → WI-FH/WI-FL/WA-F/ROOM / 右端=ホーン HORN(orange)
N 22 KEY_J     45  72
N 23 KEY_L     37  72
N 24 KEY_H     45  72
N 25 KEY_G     45  72
N 26 KEY_K     37  72
N 27 KEY_T     5   72
N 28 KEY_SPACE 9   72
