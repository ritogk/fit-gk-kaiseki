# Launchpad X - fit-gk-kaiseki ライブモード用キーマップ
#
# 対象キーのみ割り当て（それ以外のパッドは消灯）
#
# 書式: TYPE NUMBER KEY_NAME [LED_IDLE_COLOR LED_PRESSED_COLOR]
#
# レイアウト（上から見た配置、左下寄せ）:
#
#   [TL:Q] [LB:W] [HB:E] [TR:R]                               Row 4  ライト上段
#   [PS:A] [FG:S] [HZ:D]                                       Row 3  ライト下段
#   [LK:Z] [UL:X] [CH:C] [HORN]                                Row 2  アクション+ホーン
#
# LED色: 0=off 5=red 9=orange 13=yellow 21=green 37=cyan 45=blue 53=purple 72=bright

# Row 4: ライト上段 (TL, LB, HB, TR) - 橙
N 41 KEY_Q     9  72
N 42 KEY_W     9  72
N 43 KEY_E     9  72
N 44 KEY_R     9  72

# Row 3: ライト下段 (PS, FG, HZ) - 黄
N 31 KEY_A     13 72
N 32 KEY_S     13 72
N 33 KEY_D     13 72

# Row 2: アクション (LOCK, UNLOCK, CHIRP) + ホーン - 青/赤
N 21 KEY_Z     45 72
N 22 KEY_X     45 72
N 23 KEY_C     45 72
N 24 KEY_SPACE 5  72
